services:
  postgres_db:
    image: postgres:16-alpine
    container_name: se_cv_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: se_cv_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis_cache:
    image: redis:alpine
    container_name: se_cv_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
